version: "3.9"

services:
  gauntlex:
    build: .
    image: gauntlex-ai:latest
    volumes:
      - .gauntlex:/app/.gauntlex
      - ./examples:/app/examples:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - chromadb
    networks:
      - gauntlex-net
    # Override to run: docker compose run gauntlex gauntlex run --issue examples/demo_issue.md
    command: gauntlex doctor

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - gauntlex-net

  # Optional: Ollama for local model support (zero API cost)
  # Uncomment if you have NVIDIA GPU or run on ARM Mac
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - gauntlex-net

volumes:
  chromadb_data:
  # ollama_data:

networks:
  gauntlex-net:
    driver: bridge
